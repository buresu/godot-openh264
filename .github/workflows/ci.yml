name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Debug (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: x86_64
            runner: windows-latest
            cmake_args: -A x64
            ext: dll
          - os: windows
            arch: arm64
            runner: windows-latest
            cmake_args: -A ARM64
            ext: dll
          - os: macos
            arch: arm64
            runner: macos-latest
            cmake_args: ''
            ext: dylib
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            cmake_args: ''
            ext: so
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            cmake_args: ''
            ext: so

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -B build ${{ matrix.cmake_args }} -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --config Debug

      - name: Install
        run: cmake --install build --config Debug
